[package]
name = "just-ocr"
version = "0.1.0"
description = "Offline Tesseract OCR GUI"
authors = ["you"]
edition = "2021"
rust-version = "1.88"

[lib]
name = "just_ocr_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tesseract-rs = { version = "0.3", features = ["embed-tessdata"] }
image = "0.25"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
futures-util = "0.3"
tokio = { version = "1", features = ["io-util"] }
# PDF image extraction: lopdf walks page resources; flate2/fax decode the
# common compressed image streams (FlateDecode, CCITTFaxDecode). The `image`
# crate (above) handles JPEG decode and PNG re-encode.
lopdf = { version = "0.43", default-features = false }
flate2 = "1"
fax = "0.2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
